<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Task Manager</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  transition: 0.3s;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 400px;
}

.header {
  display: flex;
  justify-content: space-between;
}

.input-section {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}

input, select {
  padding: 8px;
}

button {
  padding: 8px;
  border: none;
  background: #667eea;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  background: #f4f4f4;
  margin-top: 10px;
  padding: 10px;
  border-radius: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.completed {
  text-decoration: line-through;
  color: gray;
}

.high { border-left: 5px solid red; }
.medium { border-left: 5px solid orange; }
.low { border-left: 5px solid green; }

.progress {
  width: 100%;
  height: 8px;
  background: #ddd;
  margin: 10px 0;
  border-radius: 5px;
}

#progressBar {
  height: 100%;
  width: 0%;
  background: green;
  border-radius: 5px;
}

.dark {
  background: #121212;
  color: white;
}

.dark .container {
  background: #1e1e1e;
}
</style>

</head>

<body>

<div class="container">
  <div class="header">
    <h1>Task Manager</h1>
    <button onclick="toggleDarkMode()">🌙</button>
  </div>

  <div class="input-section">
    <input type="text" id="taskInput" placeholder="Enter task...">
    <input type="date" id="dueDate">

    <select id="priority">
      <option value="Low">Low</option>
      <option value="Medium">Medium</option>
      <option value="High">High</option>
    </select>

    <button onclick="addTask()">Add</button>
  </div>

  <div class="progress">
    <div id="progressBar"></div>
  </div>

  <ul id="taskList"></ul>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
  let text = document.getElementById("taskInput").value;
  let date = document.getElementById("dueDate").value;
  let priority = document.getElementById("priority").value;

  if (!text) return;

  tasks.push({
    text,
    date,
    priority,
    completed: false
  });

  document.getElementById("taskInput").value = "";
  document.getElementById("dueDate").value = "";

  save();
  render();
}

function render() {
  let list = document.getElementById("taskList");
  list.innerHTML = "";

  let completedCount = 0;

  tasks.forEach((task, index) => {
    if (task.completed) completedCount++;

    let li = document.createElement("li");
    li.classList.add(task.priority.toLowerCase());

    li.innerHTML = `
      <span onclick="toggle(${index})" class="${task.completed ? 'completed' : ''}">
        ${task.text} (${task.date || "No date"})
      </span>

      <div>
        <button onclick="editTask(${index})">✏️</button>
        <button onclick="deleteTask(${index})">❌</button>
      </div>
    `;

    list.appendChild(li);
  });

  updateProgress(completedCount);
}

function toggle(index) {
  tasks[index].completed = !tasks[index].completed;
  save();
  render();
}

function deleteTask(index) {
  tasks.splice(index, 1);
  save();
  render();
}

function editTask(index) {
  let newText = prompt("Edit task:", tasks[index].text);
  if (newText) {
    tasks[index].text = newText;
    save();
    render();
  }
}

function updateProgress(done) {
  let total = tasks.length;
  let percent = total ? (done / total) * 100 : 0;
  document.getElementById("progressBar").style.width = percent + "%";
}

function toggleDarkMode() {
  document.body.classList.toggle("dark");
}

render();
</script>

</body>
</html>
